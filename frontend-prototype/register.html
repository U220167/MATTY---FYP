<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - Maynooth Attendance Tool</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header>
    <div class="header-content">
      <div class="logo">Maynooth Attendance Tool</div>
    </div>
  </header>

  <main class="container">
    <div style="max-width: 440px; margin: 3rem auto;">
      <div class="card">
        <h1 style="text-align: center; margin-bottom: 1.5rem;">Register</h1>
        
        <form id="register-form">
          <div class="form-group">
            <label for="email" class="form-label">Email</label>
            <input type="email" id="email" class="form-input" required placeholder="your.email@mu.ie">
          </div>

          <div class="form-group">
            <label for="password" class="form-label">Password</label>
            <input type="password" id="password" class="form-input" required placeholder="Choose a password" minlength="6">
          </div>

          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
            <div class="form-group">
              <label for="first-name" class="form-label">First name</label>
              <input type="text" id="first-name" class="form-input" required placeholder="John">
            </div>
            <div class="form-group">
              <label for="last-name" class="form-label">Last name</label>
              <input type="text" id="last-name" class="form-input" required placeholder="Doe">
            </div>
          </div>

          <div class="form-group">
            <label for="role" class="form-label">I am a</label>
            <select id="role" class="form-select" required>
              <option value="">Select role...</option>
              <option value="LECTURER">Lecturer</option>
              <option value="STUDENT">Student</option>
            </select>
          </div>

          <div id="student-id-group" class="form-group hidden">
            <label for="student-id" class="form-label">Student ID</label>
            <input type="text" id="student-id" class="form-input" placeholder="12345678" pattern="[0-9]{8}" maxlength="8">
            <small style="color: var(--text-secondary);">8-digit student number</small>
          </div>

          <div id="register-error" class="alert alert-error hidden"></div>
          <div id="register-success" class="alert alert-success hidden"></div>

          <button type="submit" class="btn btn-primary btn-block" id="register-btn">Register</button>
          <p style="text-align: center; margin-top: 1rem;">
            <a href="index.html">Already have an account? Login</a>
          </p>
        </form>
      </div>
    </div>
  </main>

  <script type="module">
    import { MockAPI, Auth } from './js/main.js';

    const form = document.getElementById('register-form');
    const errorDiv = document.getElementById('register-error');
    const successDiv = document.getElementById('register-success');
    const roleSelect = document.getElementById('role');
    const studentIdGroup = document.getElementById('student-id-group');
    const studentIdInput = document.getElementById('student-id');

    roleSelect.addEventListener('change', () => {
      if (roleSelect.value === 'STUDENT') {
        studentIdGroup.classList.remove('hidden');
        studentIdInput.setAttribute('required', 'required');
      } else {
        studentIdGroup.classList.add('hidden');
        studentIdInput.removeAttribute('required');
        studentIdInput.value = '';
      }
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      if (errorDiv) {
        errorDiv.textContent = '';
        errorDiv.classList.add('hidden');
      }
      if (successDiv) successDiv.classList.add('hidden');

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const first_name = document.getElementById('first-name').value.trim();
      const last_name = document.getElementById('last-name').value.trim();
      const role = document.getElementById('role').value;
      const student_id = document.getElementById('student-id').value.trim();

      if (!email || !password || !first_name || !last_name || !role) {
        if (errorDiv) {
          errorDiv.textContent = 'Please fill in all required fields';
          errorDiv.classList.remove('hidden');
        }
        return;
      }

      if (role === 'STUDENT' && (!student_id || !/^\d{8}$/.test(student_id))) {
        if (errorDiv) {
          errorDiv.textContent = 'Student ID must be 8 digits';
          errorDiv.classList.remove('hidden');
        }
        return;
      }

      const btn = document.getElementById('register-btn');
      if (btn) {
        btn.disabled = true;
        btn.textContent = 'Registering...';
      }

      try {
        const body = {
          email,
          password,
          first_name,
          last_name,
          role
        };
        if (role === 'STUDENT') body.student_id = student_id;

        await MockAPI.register(body);

        if (successDiv) {
          successDiv.textContent = 'Account created. Logging you in...';
          successDiv.classList.remove('hidden');
        }

        const result = await MockAPI.login(email, password, role);
        Auth.setToken(result.token);
        Auth.login(email, role, result.user);

        if (role === 'LECTURER') {
          window.location.href = 'lecturer-dashboard.html';
        } else {
          window.location.href = 'student-checkin.html';
        }
      } catch (err) {
        if (errorDiv) {
          errorDiv.textContent = err.message || 'Registration failed. Please try again.';
          errorDiv.classList.remove('hidden');
        }
        if (btn) {
          btn.disabled = false;
          btn.textContent = 'Register';
        }
      }
    });
  </script>
</body>
</html>
